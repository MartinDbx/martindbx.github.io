params:
    description: "I am a PhD student supervised by Maja Volkov from the Algebraic Geometry Unit of the Mathematics Department of the University of Mons (UMONS). My PhD is funded by the F.R.S.-FNRS. My research project results from the encounter between arithmetic and dynamical systems. It aims to make progress in solving Jonathan Lubin's conjecture, an inverse problem in the theory of formal groups defined over the ring of integers of a finite extension of Qp. This problem has been mobilizing part of the mathematical community since 1994, and remains largely open to this day. A milestone was reached by Joel Specter in 2018, relying in an essential way on methods in p-adic Hodge theory. We propose to extend these results to finite extensions of Zp."
